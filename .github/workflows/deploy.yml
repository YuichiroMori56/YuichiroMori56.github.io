name: Build and deploy website

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Install pandoc and weasyprint
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq pandoc weasyprint unzip

      - name: Install Source Sans Pro font
        run: |
          mkdir -p ~/.local/share/fonts
          curl -sL -o /tmp/ssp.zip https://github.com/adobe-fonts/source-sans/releases/download/3.006R/source-sans-pro-3.006R.zip
          unzip -o -j -q /tmp/ssp.zip 'source-sans-pro-3.006R/TTF/*.ttf' -d ~/.local/share/fonts
          fc-cache -f

      - name: Build site from cv.md
        run: python3 build/build.py

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
